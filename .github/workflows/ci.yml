name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Least privilege: CI only reads the repo (no writes to contents, packages, etc.).
permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --python ${{ matrix.python-version }}

      - name: Import check (server + all tool modules register)
        run: uv run --python ${{ matrix.python-version }} python -c "import asyncio; from aseprite_mcp.server import mcp; print('tools:', len(asyncio.run(mcp.list_tools())))"

      - name: Run unit tests
        # CI runners have no Aseprite, so the integration/golden suites are gated
        # behind --run-aseprite (not passed here). The pure-Python unit tests
        # (colour parsing, Lua serialization, path sandbox) always run for real.
        run: uv run --python ${{ matrix.python-version }} pytest -q

      - name: Check generated tool docs are in sync
        run: uv run --python ${{ matrix.python-version }} python scripts/gen_tool_docs.py --check
